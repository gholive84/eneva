name: Deploy to Hostinger

# Roda automaticamente em todo push para main + permite disparo manual.
# Hostinger desabilita shell_exec/exec/system no PHP, então não dá pra usar
# webhook PHP. A GitHub Action SSH-a no servidor e roda git pull lá.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Apenas um deploy por vez; cancela jobs antigos se um novo push chegar
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Hostinger to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          echo "known_hosts:"
          cat ~/.ssh/known_hosts | head -3
          echo "ssh-add -l:"
          ssh-add -l || true

      - name: Deploy via git pull (verbose)
        run: |
          ssh -vvv -o StrictHostKeyChecking=no -o BatchMode=yes \
              -p ${{ secrets.SSH_PORT }} \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              'cd /home/u444566027/websites/uOZW4bgwz/public_html && git pull --ff-only && git log --oneline -1'
